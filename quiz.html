<!DOCTYPE html>
<html lang="en">

<head>
    <title>Math Quiz Application</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script defer src="index.js"></script>
</head>

<body>
    /* Header section with title and score display */
    <header>
        <h1 class="header">Math Quiz Application</h1>
        <div class="headerScore" id="score"></div>
    </header>

    /* Main section with buttons to select quiz difficulty level */
    <main>
        <div class="container">
            <button onclick="startQuiz('beginner')">Beginner</button>
            <button onclick="startQuiz('intermediate')">Intermediate</button>
            <button onclick="startQuiz('advanced')">Advanced</button>
        </div>
    </main>
</body>

</html>
